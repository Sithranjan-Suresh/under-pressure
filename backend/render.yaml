services:
  - type: web
    name: under-pressure-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOWED_ORIGINS
        value: ""
      - key: ENVIRONMENT
        value: production
      - key: FOOTBALL_DATA_API_KEY
        value: ""
